<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游泳訓練課表與區間精算工具</title>
  
  <!-- 載入 Tailwind CSS 來處理排版與樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 用於在瀏覽器中直接解析 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
  
  <!-- 如果 JavaScript 被阻擋或載入失敗，會顯示這個畫面 -->
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; padding: 20px;">
      <svg style="width: 50px; height: 50px; color: #3b82f6; margin-bottom: 20px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
      <h2 style="font-size: 24px; color: #1f2937; margin-bottom: 10px;">系統載入中，請稍候...</h2>
      <p style="color: #6b7280; max-width: 400px; line-height: 1.6;">
        如果畫面一直停留在這裡，請確認您的電腦<b>有連接網路</b>（本工具需要網路載入基礎樣式）。<br><br>
        如果您看到的是密密麻麻的英文字，代表您存成了「純文字檔(.txt)」，請重新以 <b>.html</b> 附檔名存檔。
      </p>
    </div>
  </div>

  <!-- React 應用程式的程式碼 -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- 圖標 SVG 元件定義 ---
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Activity = ({className}) => <Icon className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></Icon>;
    const Calendar = ({className}) => <Icon className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></Icon>;
    const Download = ({className}) => <Icon className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></Icon>;
    const FileText = ({className}) => <Icon className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></Icon>;
    const Info = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></Icon>;
    const PieChart = ({className}) => <Icon className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></Icon>;
    const Plus = ({className}) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></Icon>;
    const PlusCircle = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></Icon>;
    const Repeat = ({className}) => <Icon className={className}><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></Icon>;
    const Tag = ({className}) => <Icon className={className}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></Icon>;
    const Trash2 = ({className}) => <Icon className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></Icon>;
    const X = ({className}) => <Icon className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></Icon>;

    // --- 設定資料 ---
    const TRAINING_ZONES = [
      { id: 'Z1', name: 'Zone 1: REC 恢復游 (HR ≤ 120)', color: 'bg-[#00FF00]', textColor: 'text-black', barColor: 'bg-[#00FF00]' },
      { id: 'Z2', name: 'Zone 2: EN1 有氧游 (HR 120-145)', color: 'bg-[#00FFFF]', textColor: 'text-black', barColor: 'bg-[#00FFFF]' },
      { id: 'Z3', name: 'Zone 3: EN2-3 混和有氧/無氧 (HR 145-175)', color: 'bg-[#FFFF00]', textColor: 'text-black', barColor: 'bg-[#FFFF00]' },
      { id: 'Z4', name: 'Zone 4: SP1-2 無氧耐力游 (HR ≥ 175)', color: 'bg-[#FF0000]', textColor: 'text-white', barColor: 'bg-[#FF0000]' },
      { id: 'Z5', name: 'Zone 5: SP3 爆發衝刺游 (磷酸肌酸)', color: 'bg-[#800080]', textColor: 'text-white', barColor: 'bg-[#800080]' },
    ];

    const CATEGORIES = [
      { id: 'W-UP', name: 'W-UP (熱身)' },
      { id: 'K', name: 'K (打水)' },
      { id: 'P', name: 'P (夾板/帶板)' },
      { id: 'PS', name: 'PS (夾板+帶板)' },
      { id: 'S', name: 'S (主項/游)' },
      { id: 'EZ', name: 'EZ (緩和游)' },
      { id: 'Drill', name: 'Drill (技術)' },
      { id: 'Other', name: '其他' }
    ];

    // --- 主應用程式元件 ---
    function App() {
      const [sets, setSets] = useState([]);
      const [category, setCategory] = useState('S');
      const [description, setDescription] = useState('');
      const [selectedZone, setSelectedZone] = useState(TRAINING_ZONES[0].id);
      const [groups, setGroups] = useState(1);
      const [subItems, setSubItems] = useState([{ id: Date.now(), reps: '', distance: '', content: '', time: '' }]);
      const [trainingDate, setTrainingDate] = useState(new Date().toISOString().split('T')[0]);
      const [manualZoneVolume, setManualZoneVolume] = useState('');
      const [manualTotalVolume, setManualTotalVolume] = useState('');

      const handleAddSubItem = () => {
        setSubItems([...subItems, { id: Date.now(), reps: '', distance: '', content: '', time: '' }]);
      };

      const handleRemoveSubItem = (id) => {
        if (subItems.length > 1) {
          setSubItems(subItems.filter(item => item.id !== id));
        }
      };

      const handleSubItemChange = (id, field, value) => {
        setSubItems(subItems.map(item => item.id === id ? { ...item, [field]: value } : item));
      };

      const handleAddSet = (e) => {
        e.preventDefault();
        const validItems = subItems.filter(item => parseInt(item.reps) > 0 && parseInt(item.distance) > 0);
        if (validItems.length === 0 || groups <= 0) return;
        
        const defaultDesc = description.trim() || `自訂課表 (${validItems.length}項組合)`;
        const singleGroupDistance = validItems.reduce((acc, item) => {
          return acc + (parseInt(item.reps, 10) * parseInt(item.distance, 10));
        }, 0);
        const totalDistance = parseInt(groups, 10) * singleGroupDistance;

        const newSet = {
          id: Date.now().toString(),
          category,
          description: defaultDesc,
          groups: parseInt(groups, 10),
          items: validItems,
          zoneId: selectedZone,
          total: totalDistance
        };

        setSets([...sets, newSet]);
        setDescription('');
        setGroups(1);
        setSubItems([{ id: Date.now(), reps: '', distance: '', content: '', time: '' }]);
      };

      const handleDeleteSet = (id) => {
        setSets(sets.filter(set => set.id !== id));
      };

      const totalVolume = useMemo(() => {
        return sets.reduce((sum, set) => sum + set.total, 0);
      }, [sets]);

      const zoneStats = useMemo(() => {
        const stats = sets.reduce((acc, set) => {
          if (!acc[set.zoneId]) acc[set.zoneId] = 0;
          acc[set.zoneId] += set.total;
          return acc;
        }, {});

        return TRAINING_ZONES.map(zone => {
          const volume = stats[zone.id] || 0;
          const percentage = totalVolume > 0 ? ((volume / totalVolume) * 100).toFixed(1) : 0;
          return { ...zone, volume, percentage };
        }).filter(z => z.volume > 0);
      }, [sets, totalVolume]);

      const manualPercentage = useMemo(() => {
        const zoneVol = parseFloat(manualZoneVolume);
        const totalVol = parseFloat(manualTotalVolume);
        if (zoneVol >= 0 && totalVol > 0) return ((zoneVol / totalVol) * 100).toFixed(1);
        return '0.0';
      }, [manualZoneVolume, manualTotalVolume]);

      const handleExportCSV = () => {
        if (sets.length === 0) return;
        const BOM = '\uFEFF';
        let csv = BOM + "日期,分類,訓練內容/備註,循環組數,課表明細,訓練區間,總距離(m)\n";
        
        sets.forEach(set => {
          const zoneName = TRAINING_ZONES.find(z => z.id === set.zoneId)?.name || set.zoneId;
          const safeDesc = set.description.replace(/"/g, '""');
          const itemsText = set.items.map(item => {
            const extraDetails = [item.content, item.time].filter(Boolean).join(' ');
            return `${item.reps}x${item.distance}m${extraDetails ? ` (${extraDetails})` : ''}`;
          }).join(' + ');
          
          csv += `${trainingDate},${set.category},"${safeDesc}",${set.groups},"${itemsText}","${zoneName}",${set.total}\n`;
        });

        csv += "\n--- 總計與區間分析 ---\n";
        csv += `當日總訓練量(m),${totalVolume}\n`;
        zoneStats.forEach(stat => {
          csv += `${stat.name},${stat.volume}m,${stat.percentage}%\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', `訓練紀錄_${trainingDate}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans">
          <div className="max-w-5xl mx-auto space-y-6">
            
            <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
              <div>
                <h1 className="text-3xl font-bold text-gray-800 flex items-center gap-2">
                  <Activity className="w-8 h-8 text-blue-600" />
                  游泳訓練課表與區間精算工具
                </h1>
                <p className="text-gray-600 mt-2">支援單一項目與複雜組合課表，自動精算各強度區間的比例。</p>
              </div>
              <div className="flex items-center gap-2 bg-white p-2 px-4 rounded-lg shadow-sm border border-gray-100">
                <Calendar className="w-5 h-5 text-blue-500" />
                <input 
                  type="date" 
                  value={trainingDate}
                  onChange={(e) => setTrainingDate(e.target.value)}
                  className="bg-transparent border-none outline-none text-gray-700 font-medium cursor-pointer"
                />
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-t-4 border-t-blue-500">
                  <h2 className="text-xl font-semibold mb-4 text-gray-800">建立課表</h2>
                  <form onSubmit={handleAddSet} className="space-y-5">
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">分類</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <Tag className="h-4 w-4 text-gray-400" />
                          </div>
                          <select
                            value={category}
                            onChange={(e) => setCategory(e.target.value)}
                            className="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-blue-700 bg-white"
                          >
                            {CATEGORIES.map(c => (
                              <option key={c.id} value={c.id}>{c.name}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">內容與備註 (選填)</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <FileText className="h-4 w-4 text-gray-400" />
                          </div>
                          <input
                            type="text"
                            value={description}
                            onChange={(e) => setDescription(e.target.value)}
                            className="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="例: SNK+P, 15uw..."
                          />
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">訓練區間</label>
                        <select
                          value={selectedZone}
                          onChange={(e) => setSelectedZone(e.target.value)}
                          className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-gray-50 font-medium"
                        >
                          {TRAINING_ZONES.map(zone => (
                            <option key={zone.id} value={zone.id}>{zone.name}</option>
                          ))}
                        </select>
                      </div>
                    </div>

                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 relative">
                      <div className="flex flex-col md:flex-row gap-4 items-start md:items-center">
                        
                        <div className="shrink-0 text-center flex flex-col items-center">
                          <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">循環組數</label>
                          <div className="flex items-center gap-2">
                            <input
                              type="number"
                              min="1"
                              value={groups}
                              onChange={(e) => setGroups(e.target.value)}
                              className="w-20 text-center px-2 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-xl text-blue-700 shadow-sm"
                              required
                            />
                            <span className="text-slate-400 font-bold text-xl">組</span>
                          </div>
                        </div>

                        <div className="hidden md:flex flex-col items-center justify-center shrink-0 text-slate-300 px-2 mt-4">
                          <X className="w-6 h-6" />
                        </div>

                        <div className="flex-grow w-full border-l-0 md:border-l-2 border-slate-200 md:pl-6 space-y-3">
                          <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">課表明細 (趟數 × 距離 | 姿勢 | 時間)</label>
                          
                          {subItems.map((item, index) => (
                            <div key={item.id} className="flex flex-wrap items-center gap-2 bg-white p-2 rounded-lg border border-slate-100 shadow-sm">
                              <input
                                type="number" min="1" placeholder="趟" required
                                value={item.reps}
                                onChange={(e) => handleSubItemChange(item.id, 'reps', e.target.value)}
                                className="w-16 px-2 py-1.5 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-center"
                              />
                              <X className="w-3 h-3 text-slate-400 shrink-0" />
                              <input
                                type="number" min="1" placeholder="m" required
                                value={item.distance}
                                onChange={(e) => handleSubItemChange(item.id, 'distance', e.target.value)}
                                className="w-20 px-2 py-1.5 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-center"
                              />
                              <span className="text-slate-300 mx-1">|</span>
                              <input
                                type="text" placeholder="姿勢 (例: fr)"
                                value={item.content}
                                onChange={(e) => handleSubItemChange(item.id, 'content', e.target.value)}
                                className="w-28 px-2 py-1.5 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                              />
                              <input
                                type="text" placeholder="時間 (例: @00:43)"
                                value={item.time}
                                onChange={(e) => handleSubItemChange(item.id, 'time', e.target.value)}
                                className="w-32 px-2 py-1.5 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                              />
                              
                              {subItems.length > 1 && (
                                <button
                                  type="button"
                                  onClick={() => handleRemoveSubItem(item.id)}
                                  className="ml-auto p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                                >
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              )}
                            </div>
                          ))}
                          
                          <button
                            type="button"
                            onClick={handleAddSubItem}
                            className="mt-2 flex items-center gap-1.5 text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors py-1 px-2 rounded-md hover:bg-blue-50"
                          >
                            <PlusCircle className="w-4 h-4" /> 增加項目 (例如: 接下一個距離)
                          </button>
                        </div>
                      </div>
                    </div>

                    <button
                      type="submit"
                      className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md hover:shadow-lg"
                    >
                      <Plus className="w-5 h-5" /> 加入到今日課表清單
                    </button>
                  </form>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                    <h2 className="text-xl font-semibold text-gray-800">目前課表清單</h2>
                    <button
                      onClick={handleExportCSV}
                      disabled={sets.length === 0}
                      className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                        sets.length === 0 
                          ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                          : 'bg-green-50 text-green-700 hover:bg-green-100 border border-green-200'
                      }`}
                    >
                      <Download className="w-4 h-4" />
                      匯出今日紀錄 (CSV)
                    </button>
                  </div>
                  
                  {sets.length === 0 ? (
                    <div className="text-center py-10 text-gray-400 border-2 border-dashed border-gray-200 rounded-xl">
                      <Repeat className="w-10 h-10 mx-auto mb-3 opacity-30" />
                      <p>尚未新增任何課表，請在上方設定您的訓練組合。</p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {sets.map((set) => {
                        const zoneInfo = TRAINING_ZONES.find(z => z.id === set.zoneId);
                        return (
                          <div key={set.id} className="relative p-5 bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                            <div className="flex items-start justify-between gap-4">
                              <div className="flex-grow space-y-2">
                                <div className="flex items-center gap-3 flex-wrap">
                                  <span className="px-2 py-1 bg-slate-800 text-white rounded text-xs font-bold uppercase tracking-wide shadow-sm">
                                    {set.category}
                                  </span>
                                  <span className={`px-2.5 py-1 rounded-md text-xs font-bold shadow-sm ${zoneInfo.color} ${zoneInfo.textColor}`}>
                                    {zoneInfo.id}
                                  </span>
                                  <h3 className="font-bold text-gray-800 text-lg">{set.description}</h3>
                                </div>
                                
                                <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 flex flex-col gap-2 text-slate-700">
                                  <div className="flex flex-wrap items-center gap-2">
                                    {set.groups > 1 && (
                                      <React.Fragment>
                                        <span className="font-black text-blue-700 text-lg">{set.groups}</span>
                                        <span className="text-sm font-medium text-slate-500">組</span>
                                        <X className="w-4 h-4 text-slate-400" />
                                        <span className="text-slate-400 font-medium">(</span>
                                      </React.Fragment>
                                    )}
                                    
                                    <div className="flex flex-wrap items-center gap-2">
                                      {set.items.map((item, idx) => (
                                        <React.Fragment key={idx}>
                                          <div className="flex flex-col bg-white px-2 py-1.5 rounded shadow-sm border border-slate-200 min-w-[120px]">
                                            <span className="font-bold text-sm text-center">
                                              {item.reps}趟 × {item.distance}m
                                            </span>
                                            {(item.content || item.time) && (
                                              <div className="flex justify-between items-center text-xs text-slate-600 mt-1 border-t border-slate-100 pt-1">
                                                <span className="font-medium text-blue-700">{item.content}</span>
                                                <span className="font-mono bg-slate-100 px-1 rounded">{item.time}</span>
                                              </div>
                                            )}
                                          </div>
                                          {idx < set.items.length - 1 && <span className="text-slate-400 font-bold">+</span>}
                                        </React.Fragment>
                                      ))}
                                    </div>

                                    {set.groups > 1 && <span className="text-slate-400 font-medium">)</span>}
                                  </div>
                                </div>
                              </div>
                              
                              <div className="flex flex-col items-end shrink-0 gap-3">
                                <button
                                  onClick={() => handleDeleteSet(set.id)}
                                  className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                                  title="刪除"
                                >
                                  <Trash2 className="w-5 h-5" />
                                </button>
                                <div className="text-right">
                                  <p className="text-xs font-medium text-gray-500 uppercase">此項總計</p>
                                  <p className="text-xl font-bold text-blue-600">{set.total} m</p>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

              <div className="space-y-6">
                
                <div className="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-2xl shadow-md text-white relative overflow-hidden">
                  <div className="relative z-10">
                    <p className="text-blue-100 font-medium mb-1">今日總訓練距離</p>
                    <div className="flex items-baseline gap-2">
                      <span className="text-5xl font-bold">{totalVolume.toLocaleString()}</span>
                      <span className="text-xl text-blue-100 font-medium">公尺</span>
                    </div>
                  </div>
                  <Activity className="absolute -bottom-4 -right-4 w-32 h-32 text-blue-400 opacity-20" />
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <div className="flex items-center gap-2 mb-6">
                    <PieChart className="w-5 h-5 text-gray-600" />
                    <h2 className="text-xl font-semibold text-gray-800">區間百分比分析</h2>
                  </div>
                  
                  {totalVolume === 0 ? (
                    <p className="text-sm text-gray-500 text-center py-4">新增課表後將顯示區間比例</p>
                  ) : (
                    <div className="space-y-5">
                      {zoneStats.map((stat) => (
                        <div key={stat.id}>
                          <div className="flex justify-between items-end mb-1">
                            <span className="text-sm font-medium text-gray-700">{stat.name}</span>
                            <div className="text-right">
                              <span className="text-sm font-semibold text-gray-900">{stat.volume} m</span>
                              <span className="text-xs font-bold text-gray-500 ml-2">({stat.percentage}%)</span>
                            </div>
                          </div>
                          <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden border border-gray-200">
                            <div 
                              className={`h-2.5 rounded-full ${stat.barColor} transition-all duration-500 ease-out`} 
                              style={{ width: `${stat.percentage}%` }}
                            ></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                  <h2 className="text-lg font-semibold mb-2 text-slate-800 flex items-center gap-2">
                    <Info className="w-4 h-4 text-blue-500" />
                    獨立驗算工具
                  </h2>
                  <p className="text-xs text-slate-500 mb-4 font-mono bg-white p-2 rounded border border-slate-100">
                    (區間量 ÷ 總量) × 100%
                  </p>
                  
                  <div className="space-y-3">
                    <div>
                      <input
                        type="number" min="0" value={manualZoneVolume} onChange={(e) => setManualZoneVolume(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm outline-none focus:border-blue-500 bg-white"
                        placeholder="輸入區間距離 (m)"
                      />
                    </div>
                    <div>
                      <input
                        type="number" min="1" value={manualTotalVolume} onChange={(e) => setManualTotalVolume(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm outline-none focus:border-blue-500 bg-white"
                        placeholder="輸入總距離 (m)"
                      />
                    </div>
                    
                    <div className="pt-2 flex justify-between items-center">
                      <span className="text-slate-600 text-sm font-medium">計算結果：</span>
                      <div className="text-right">
                        <span className="text-2xl font-bold text-blue-600">{manualPercentage}</span>
                        <span className="text-sm font-bold text-blue-600">%</span>
                      </div>
                    </div>
                  </div>
                </div>

              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
